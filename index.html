<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>provider.4 — EXIF ULTIMATE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
/* ══════════════ TEMELLER ══════════════ */
:root{
  --bg:#000;--surf:#0d0d0d;--surf2:#161616;--surf3:#1e1e1e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --a:#00ff88;--a-glow:rgba(0,255,136,0.15);--danger:#ff3355;
  --text:#fff;--text2:#888;--mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ══════════════ GİRİŞ EKRANI ══════════════ */
#loginScreen {
    position:fixed; inset:0; background:var(--bg); z-index:99999;
    display:flex; align-items:center; justify-content:center;
    background-image: radial-gradient(circle at 50% 50%, #0a1510 0%, #000 100%);
}
.login-card {
    width:100%; max-width:380px; background:rgba(13,13,13,0.8); border:1px solid var(--border);
    padding:48px 32px; border-radius:32px; text-align:center; backdrop-filter: blur(20px);
}
.login-logo { font-family:var(--mono); color:var(--a); letter-spacing:6px; font-size:14px; margin-bottom:12px; font-weight:800; }
.login-input {
    width:100%; background:var(--surf2); border:1px solid var(--border);
    border-radius:16px; color:#fff; padding:16px; font-family:var(--mono);
    outline:none; transition:0.3s; text-align:center; margin-bottom:12px; font-size:14px;
}
.login-btn {
    width:100%; background:var(--a); color:#000; border:none;
    padding:18px; border-radius:16px; font-weight:900; cursor:pointer; transition:0.3s;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--a-glow); }

/* ══════════════ ANA UYGULAMA (ORİJİNAL) ══════════════ */
.app-container { display:none; max-width:1000px; margin:0 auto; padding:40px 20px; }
.authorized { display:block !important; }

.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
#dropZone {
    background:var(--surf); border:2px dashed var(--border2); border-radius:24px;
    padding:80px 20px; text-align:center; cursor:pointer; transition:0.3s;
}
.forgery-card { background:rgba(255,51,85,0.05); border:1px solid var(--danger); padding:20px; border-radius:20px; margin:24px 0; display:none; }
.ai-card { background:var(--surf); border:1px solid var(--border); padding:24px; border-radius:20px; margin:24px 0; }
.meta-table { width:100%; border-collapse:collapse; margin-top:20px; }
.meta-table td { padding:14px; border-bottom:1px solid var(--border); font-family:var(--mono); font-size:13px; }
.meta-key { color:var(--text2); }
.meta-val { color:var(--a); text-align:right; word-break:break-all; }

.btn-row { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.tool-btn { background:var(--surf2); color:var(--text); border:1px solid var(--border); padding:10px 20px; border-radius:12px; cursor:pointer; font-size:12px; font-family:var(--mono); }
</style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <div class="login-logo">PROVIDER.4</div>
        <h1 style="margin-bottom:32px;">Sistem Erişimi</h1>
        <input type="text" id="loginUser" class="login-input" placeholder="Kullanıcı Adı">
        <input type="password" id="loginKey" class="login-input" placeholder="Key">
        <button class="login-btn" onclick="checkAccess()">ERİŞİM SAĞLA</button>
        <p id="status" style="margin-top:20px; font-size:10px; font-family:var(--mono); color:var(--danger)"></p>
    </div>
</div>

<div class="app-container" id="mainApp">
    <div class="header">
        <h2 style="font-weight:800; letter-spacing:-1px;">EXIF <span style="color:var(--a)">ULTIMATE</span></h2>
        <div id="userBadge" style="font-family:var(--mono); font-size:12px; color:var(--a)"></div>
    </div>

    <div id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size:48px; margin-bottom:16px;">📂</div>
        <h3>Analiz İçin Görsel Seç</h3>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="processFile(this.files[0])">
    </div>

    <div id="results" style="display:none;">
        <div id="forgeryAlert" class="forgery-card">
            <h4 style="margin-bottom:8px;">⚠️ DİJİTAL MÜDAHALE TESPİT EDİLDİ</h4>
            <p id="forgeryDetails" style="font-size:13px;"></p>
        </div>

        <div class="btn-row">
            <button class="tool-btn" onclick="exportPDF()">PDF RAPOR</button>
            <button class="tool-btn" onclick="exportCSV()">CSV DIŞA AKTAR</button>
            <button class="tool-btn" onclick="copyMeta()">TÜMÜNÜ KOPYALA</button>
        </div>

        <div class="ai-card">
            <span style="font-family:var(--mono); font-size:10px; color:var(--a)">AI ANALİZ VE KONUM</span>
            <div id="aiReport" style="margin-top:12px; font-size:14px; line-height:1.6; color:#ccc;"></div>
        </div>

        <table class="meta-table" id="metaTable"></table>
    </div>
</div>

<script>
const GIST_ID = '1ae4dd781cc3b4f8fd70f3c3bc77c3d9';
let exifData = {};

// ════════ KEY SİSTEMİ (403 FIX) ════════
async function checkAccess() {
    const u = document.getElementById('loginUser').value.trim();
    const k = document.getElementById('loginKey').value.trim();
    const st = document.getElementById('status');
    if(!u || !k) return;

    st.style.color = "var(--a)";
    st.innerText = "DOĞRULANIYOR...";

    try {
        const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            headers: { 'Accept': 'application/vnd.github.v3+json' },
            cache: 'no-store'
        });

        if (!response.ok) throw new Error(response.status);

        const data = await response.json();
        const db = JSON.parse(data.files['p4_db.json'].content);
        const user = db.find(x => x.user === u && x.key === k && x.status === 'active');

        if(user) {
            sessionStorage.setItem('p4_auth', 'true');
            sessionStorage.setItem('p4_name', user.user);
            showApp(user.user);
        } else {
            st.style.color = "var(--danger)";
            st.innerText = "HATALI KİMLİK BİLGİLERİ!";
        }
    } catch(e) {
        st.style.color = "var(--danger)";
        st.innerText = "GITHUB BAĞLANTI HATASI (403/404)!";
    }
}

function showApp(name) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('authorized');
    document.getElementById('userBadge').innerText = `@${name}`;
}

// ════════ EXIF - V3 FONKSİYONLARI ════════
function processFile(file) {
    if(!file) return;
    document.getElementById('results').style.display = 'block';
    
    EXIF.getData(file, function() {
        const all = EXIF.getAllTags(this);
        exifData = all;

        // Sahtecilik Kontrolü (Orijinal Logic)
        const software = all.Software || "";
        const alert = document.getElementById('forgeryAlert');
        if(software.match(/Adobe|Photoshop|GIMP|Canva|Pixelmator/i)) {
            alert.style.display = 'block';
            document.getElementById('forgeryDetails').innerText = `Yazılım: ${software}. Görsel manipüle edilmiş olabilir.`;
        } else { alert.style.display = 'none'; }

        // AI & Cihaz Raporu
        let report = `<b>Cihaz:</b> ${all.Make || 'Belirsiz'} ${all.Model || ''}<br>`;
        if(all.GPSLatitude) {
            const lat = convert(all.GPSLatitude, all.GPSLatitudeRef);
            const lon = convert(all.GPSLongitude, all.GPSLongitudeRef);
            report += `<b>Konum:</b> ${lat.toFixed(6)}, ${lon.toFixed(6)}<br><a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" style="color:var(--a)">Haritada Aç</a>`;
        } else { report += `<b>Konum:</b> GPS verisi bulunamadı.`; }
        document.getElementById('aiReport').innerHTML = report;

        // Tabloyu Yazdır
        const table = document.getElementById('metaTable');
        table.innerHTML = "";
        Object.entries(all).forEach(([k, v]) => {
            if(typeof v === 'object' || typeof v === 'function') return;
            table.innerHTML += `<tr><td class="meta-key">${k}</td><td class="meta-val">${v}</td></tr>`;
        });
    });
}

function convert(c, r) {
    let d = c[0] + c[1]/60 + c[2]/3600;
    return (r === "S" || r === "W") ? -d : d;
}

// ════════ EXPORT & UTILS ════════
function copyMeta() {
    const text = Object.entries(exifData).map(([k,v])=>`${k}: ${v}`).join('\n');
    navigator.clipboard.writeText(text);
    alert("Metinler kopyalandı!");
}
function exportCSV() {
    const csv = "Key,Value\n" + Object.entries(exifData).map(([k,v])=>`"${k}","${v}"`).join('\n');
    dl(new Blob([csv], {type:'text/csv'}), "exif-export.csv");
}
function exportPDF() {
    const content = `provider.4 EXIF REPORT\n${'='.repeat(20)}\n${Object.entries(exifData).map(([k,v])=>k+": "+v).join('\n')}`;
    dl(new Blob([content], {type:'text/plain'}), "exif-report.txt");
}
function dl(b, n) {
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = n; a.click();
}

if(sessionStorage.getItem('p4_auth') === 'true') showApp(sessionStorage.getItem('p4_name'));
</script>
</body>
</html>
